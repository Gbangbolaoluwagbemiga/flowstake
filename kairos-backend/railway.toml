# Railway: set service "Root Directory" to `kairos-backend` (this folder).
# This file opts into Docker build so Railpack does not need to guess the monorepo layout.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
# First boot + npm can be slow; allow time for container to listen on 0.0.0.0
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
